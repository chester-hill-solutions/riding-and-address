name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Check billing invariants
        run: npm run check:billing-invariants

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Run tests
        run: npm test

  portal:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            portal/package-lock.json

      # Root deps are needed too: the combined Worker entry (portal/workers/app.ts)
      # imports ../../src/worker, whose sources resolve zod and
      # @cloudflare/workers-types from the repo root node_modules.
      - name: Install root dependencies
        run: npm ci

      - name: Install portal dependencies
        working-directory: portal
        run: npm ci

      - name: Portal typecheck
        working-directory: portal
        run: npm run typecheck

      - name: Portal build + Worker dry-run
        working-directory: portal
        env:
          NODE_ENV: production
          CLOUDFLARE_ACCOUNT_ID: ad5ec479b9a421faa2ed06c3d1c2b23a
        run: npm run build && npx wrangler deploy --dry-run --env=""
