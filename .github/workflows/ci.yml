name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Check billing invariants
        run: npm run check:billing-invariants

      - name: Validate Worker bundle
        run: npx wrangler deploy --dry-run

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Run tests
        run: npm test

  portal:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install portal dependencies
        working-directory: portal
        run: npm ci

      - name: Portal typecheck
        working-directory: portal
        run: npm run typecheck

      - name: Portal build
        working-directory: portal
        env:
          # Build-time only; requireEnv() runs at server boot in production.
          NODE_ENV: production
        run: npm run build
