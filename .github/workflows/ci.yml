name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

      - name: Check billing invariants
        run: bun run check:billing-invariants

      - name: Audit dependencies
        run: bun audit --audit-level=high

      - name: Run tests
        run: bun run test

  portal:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      # Root deps are needed too: the combined Worker entry (portal/workers/app.ts)
      # imports ../../src/worker, whose sources resolve zod and
      # @cloudflare/workers-types from the repo root node_modules.
      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install portal dependencies
        working-directory: portal
        run: bun install --frozen-lockfile

      - name: Portal typecheck
        working-directory: portal
        run: bun run typecheck

      - name: Portal build + Worker dry-run
        working-directory: portal
        env:
          NODE_ENV: production
          CLOUDFLARE_ACCOUNT_ID: ad5ec479b9a421faa2ed06c3d1c2b23a
        run: bun run build && bunx wrangler deploy --dry-run --env=""
